<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Designer Portfolio</title>

  <style>
    /* ===== BASIC RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #333;
      overflow-x: hidden;
    }

    /* ===== LOGO & NAV ===== */
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #6c63ff;
      text-align: center;
      margin-top: 20px;
    }

    nav a {
      color: #6c63ff;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    nav a:hover {
      color: #4a42e6;
    }

    /* ===== HERO SECTION ===== */
    .hero {
      background: #6c63ff;
      color: white;
      text-align: center;
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
    }

    /* Typing effect */
    .typing {
      width: 0;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid white;
      animation: typing 3s steps(20) forwards;
      margin: auto;
    }

    @keyframes typing {
      to { width: 260px; }
    }

    .profile-photo {
      width: 120px;
      border-radius: 50%;
      margin: 20px 0;
      transition: transform 0.3s;
    }

    .profile-photo:hover {
      transform: scale(1.1);
    }

    button {
      padding: 10px 25px;
      border: none;
      background: white;
      color: #6c63ff;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* ===== BUZZLE BOX ===== */
    #place {
      width: 200px;
      height: 120px;
      background: gold;
      margin: 40px auto;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      cursor: pointer;
      position: relative;
    }

    .buzzle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      opacity: 0;
    }

    #place:hover .buzzle {
      animation: fly 1s ease-out forwards;
      opacity: 1;
    }

    @keyframes fly {
      to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
      }
    }

    /* ===== ABOUT ===== */
    .about {
      padding: 60px 20px;
      text-align: center;
    }

    /* ===== PROJECTS ===== */
    .projects {
      background: white;
      padding: 60px 20px;
      text-align: center;
    }

    .project-card {
      width: 220px;
      height: 140px;
      background: #e0e0e0;
      display: inline-block;
      margin: 15px;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .project-card span {
      position: absolute;
      bottom: -100%;
      width: 100%;
      height: 100%;
      background: rgba(108,99,255,0.9);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: bottom 0.4s;
    }

    .project-card:hover span {
      bottom: 0;
    }

    /* ===== FOOTER ===== */
    footer {
      background: #4a42e6;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Floating decoration */
    .float {
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: float 4s infinite ease-in-out;
    }

    @keyframes float {
      50% { transform: translateY(-20px); }
    }
  </style>
</head>

<body>

  <div class="logo">G.F..Gloria</div>
  <nav style="text-align:center; padding:15px">
    <a href="#">Projects</a> |
    <a href="#">About</a> |
    <a href="#">Contact</a>
  </nav>

  <header class="hero">
    <h1 class="typing">Hello, I’m Gloria</h1>
    <img src="me.png" alt="me" class="profile-photo">
    <p>A Creative & Passionate Designer</p>
    <button>View My Work</button>

    <!-- Buzzle hover box -->
    <div id="place">
      Hover Me!
      <div class="buzzle" style="--x:-80px;--y:-100px"></div>
      <div class="buzzle" style="--x:60px;--y:-120px"></div>
      <div class="buzzle" style="--x:-40px;--y:-140px"></div>
      <div class="buzzle" style="--x:80px;--y:-90px"></div>
    </div>

    <!-- Floating shapes -->
    <div class="float" style="top:20px;left:30px"></div>
    <div class="float" style="top:60px;right:50px"></div>
  </header>

  <section class="about">
    <h2>About Me</h2>
    <p>I am a passionate designer who loves creating clean, modern designs.</p>
  </section>

  <section class="projects">
    <h2>My Projects</h2>

    <div class="project-card">
      Project 1
      <span>View Project</span>
    </div>

    <div class="project-card">
      Project 2
      <span>View Project</span>
    </div>

    <div class="project-card">
      Project 3
      <span>View Project</span>
    </div>
  </section>

  <footer>
    <p>© 2026 G.F..Gloria</p>
  </footer>

</body>
</html>
